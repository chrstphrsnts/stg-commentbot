<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comment Reply Bot</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: rgba(255,255,255,0.08);
      --accent: #c8f135;
      --accent2: #f135a0;
      --text: #f0efe8;
      --muted: #6b6b7a;
      --success: #4ade80;
      --warning: #fb923c;
      --danger: #f87171;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    .wrap { max-width: 700px; margin: 0 auto; position: relative; z-index: 1; }

    header { margin-bottom: 2.5rem; }
    .logo { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.5rem; }
    .logo-dot {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--accent); display: grid; place-items: center;
      font-size: 1.1rem;
    }
    h1 {
      font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800;
      letter-spacing: -0.5px; color: var(--text);
    }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-left: 52px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.4rem;
      margin-bottom: 1rem;
    }

    label {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--muted); font-weight: 600; display: block; margin-bottom: 0.6rem;
    }

    .pills { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill {
      padding: 6px 14px; border-radius: 999px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: all 0.15s;
    }
    .pill:hover { border-color: rgba(255,255,255,0.2); }
    .pill.active {
      background: var(--accent); color: #0d0d0f; border-color: var(--accent);
      font-weight: 700;
    }
    .pill.active.pink { background: var(--accent2); border-color: var(--accent2); color: #fff; }

    input[type="text"] {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: rgba(200,241,53,0.4); }

    textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 0.88rem; line-height: 1.65;
      resize: vertical; outline: none; min-height: 140px; transition: border-color 0.15s;
    }
    textarea:focus { border-color: rgba(200,241,53,0.4); }
    textarea::placeholder { color: var(--muted); }

    .row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .row > div { flex: 1; min-width: 200px; }

    #generateBtn {
      width: 100%; padding: 15px; border-radius: 12px; border: none;
      background: var(--accent); color: #0d0d0f;
      font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.2px;
      margin-bottom: 1.5rem;
      box-shadow: 0 0 30px rgba(200,241,53,0.2);
    }
    #generateBtn:hover { transform: translateY(-1px); box-shadow: 0 4px 30px rgba(200,241,53,0.35); }
    #generateBtn:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }

    .error { color: #f87171; font-size: 0.83rem; margin-top: 6px; }

    #resultsHeader {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem; display: none;
    }
    #resultsHeader h2 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
    .copy-all-btn {
      padding: 6px 16px; border-radius: 999px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text); font-size: 0.78rem;
      font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
    }
    .copy-all-btn:hover { border-color: rgba(255,255,255,0.2); }
    .copy-all-btn.done { background: var(--success); color: #0d0d0f; border-color: var(--success); }

    #repliesList { display: flex; flex-direction: column; gap: 0.75rem; }

    .reply-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1rem 1.2rem;
      animation: fadeUp 0.3s ease both;
    }
    .reply-card.skipped { opacity: 0.35; }
    .reply-card.needs-human {
      border-color: rgba(251, 146, 60, 0.4);
      background: rgba(251, 146, 60, 0.05);
    }
    .reply-card.keyword-match {
      border-color: rgba(200, 241, 53, 0.3);
      background: rgba(200, 241, 53, 0.03);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .comment-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); margin-bottom: 4px; }
    .comment-text { font-size: 0.88rem; color: #9ca3af; font-style: italic; margin-bottom: 0.7rem; }
    .reply-text { font-size: 0.95rem; color: var(--text); font-weight: 500; margin-bottom: 0.75rem; line-height: 1.5; }

    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 999px; font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.5px; margin-bottom: 0.6rem;
    }
    .badge.human { background: rgba(251,146,60,0.15); color: var(--warning); border: 1px solid rgba(251,146,60,0.3); }
    .badge.keyword { background: rgba(200,241,53,0.1); color: var(--accent); border: 1px solid rgba(200,241,53,0.25); }
    .badge.ai { background: rgba(241,53,160,0.1); color: var(--accent2); border: 1px solid rgba(241,53,160,0.25); }

    .copy-btn {
      padding: 4px 14px; border-radius: 999px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 0.75rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
    }
    .copy-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .copy-btn.done { background: var(--success); color: #0d0d0f; border-color: var(--success); }

    .loader {
      display: flex; gap: 5px; justify-content: center; align-items: center;
      padding: 2rem 0; display: none;
    }
    .loader span {
      width: 7px; height: 7px; background: var(--accent); border-radius: 50%;
      animation: bounce 0.6s ease infinite;
    }
    .loader span:nth-child(2) { animation-delay: 0.1s; }
    .loader span:nth-child(3) { animation-delay: 0.2s; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-6px); opacity: 1; }
    }

    .divider { height: 1px; background: var(--border); margin: 1rem 0; }

    .kb-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem;
    }
    .kb-header label { margin-bottom: 0; }
    .kb-toggle {
      font-size: 0.75rem; color: var(--accent); background: none; border: none;
      cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; padding: 0;
    }
    .kb-toggle:hover { opacity: 0.8; }
    .kb-fields { display: flex; flex-direction: column; gap: 0.6rem; }
    .kb-row { display: flex; gap: 8px; align-items: flex-start; }
    .kb-row input { flex: 1; }
    .kb-row textarea { flex: 2; min-height: 60px; font-size: 0.83rem; }
    .kb-remove {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 1.1rem; padding: 8px 4px; line-height: 1; transition: color 0.15s;
    }
    .kb-remove:hover { color: #f87171; }
    .kb-add {
      background: none; border: 1px dashed var(--border); border-radius: 8px;
      color: var(--muted); font-size: 0.8rem; padding: 7px; width: 100%;
      cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; margin-top: 4px;
    }
    .kb-add:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

    /* Summary bar */
    .summary-bar {
      display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem;
    }
    .summary-pill {
      padding: 4px 12px; border-radius: 999px; font-size: 0.75rem; font-weight: 600;
    }
    .summary-pill.total { background: var(--surface2); color: var(--muted); }
    .summary-pill.human { background: rgba(251,146,60,0.15); color: var(--warning); }
    .summary-pill.keyword { background: rgba(200,241,53,0.1); color: var(--accent); }
    .summary-pill.ai { background: rgba(241,53,160,0.1); color: var(--accent2); }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="wrap">

    <header>
      <div class="logo">
        <div class="logo-dot">✦</div>
        <h1>Comment Reply Bot</h1>
      </div>
      <p class="subtitle">AI-powered replies with smart keyword detection</p>
    </header>

    <!-- Platform -->
    <div class="card">
      <label>Platform</label>
      <div class="pills" id="platformPills">
        <button class="pill active" data-val="Facebook">Facebook</button>
        <button class="pill" data-val="Instagram">Instagram</button>
        <button class="pill" data-val="TikTok">TikTok</button>
        <button class="pill" data-val="YouTube">YouTube</button>
        <button class="pill" data-val="Twitter/X">Twitter/X</button>
      </div>
    </div>

    <!-- Vibe -->
    <div class="card">
      <label>Reply Vibe</label>
      <div class="pills" id="vibePills">
        <button class="pill active" data-val="Wholesome & warm — supportive, kind, uses heart emojis, makes followers feel appreciated and seen">💛 Wholesome</button>
        <button class="pill" data-val="Fun & playful — witty, uses humor and fun emojis, light-hearted and energetic">🎉 Playful</button>
        <button class="pill" data-val="Professional & polished — helpful, clear, minimal emojis, brand-forward tone">💼 Professional</button>
        <button class="pill pink" data-val="Hype & bold — confident, uses fire and hype emojis, makes followers feel excited">🔥 Hype</button>
      </div>
    </div>

    <!-- Product Knowledge Base -->
    <div class="card">
      <div class="kb-header">
        <label>Product Knowledge Base</label>
        <button class="kb-toggle" onclick="toggleKb()">▾ Collapse</button>
      </div>
      <div id="kbBody">
        <div class="kb-fields" id="kbFields"></div>
        <button class="kb-add" onclick="addKbRow()">+ Add product detail</button>
        <p style="color:var(--muted);font-size:0.75rem;margin-top:8px;">e.g. "Shipping" → "Free shipping on orders over $50, ships in 2–3 days"</p>
      </div>
    </div>

    <!-- Username -->
    <div class="card">
      <div class="row">
        <div>
          <label>Your Username</label>
          <input type="text" id="username" placeholder="@yourhandle" />
        </div>
      </div>
    </div>

    <!-- Comments -->
    <div class="card">
      <label>Comments — Paste one per line</label>
      <textarea id="commentsInput" placeholder="Paste comments here, one per line..."></textarea>
      <div class="error" id="errorMsg"></div>
    </div>

    <button id="generateBtn" onclick="generate()">✦ Generate Replies</button>

    <div class="loader" id="loader">
      <span></span><span></span><span></span>
    </div>

    <div id="resultsHeader">
      <h2 id="resultsCount"></h2>
      <button class="copy-all-btn" id="copyAllBtn" onclick="copyAll()">Copy All</button>
    </div>

    <div class="summary-bar" id="summaryBar" style="display:none"></div>
    <div id="repliesList"></div>

  </div>

  <script>
    let platform = "Facebook";
    let vibe = "Wholesome & warm — supportive, kind, uses heart emojis, makes followers feel appreciated and seen";
    let currentReplies = [];
    let kbCollapsed = false;

    function addKbRow(topic = "", detail = "") {
      const container = document.getElementById("kbFields");
      const idx = Date.now();
      const row = document.createElement("div");
      row.className = "kb-row";
      row.id = `kb-${idx}`;
      row.innerHTML = `
        <input type="text" placeholder="Topic (e.g. Pricing)" value="${escHtml(topic)}" style="max-width:160px"/>
        <textarea placeholder="Detail (e.g. Starts at $29/mo, free trial available)">${escHtml(detail)}</textarea>
        <button class="kb-remove" onclick="document.getElementById('kb-${idx}').remove()" title="Remove">×</button>
      `;
      container.appendChild(row);
    }

    function toggleKb() {
      kbCollapsed = !kbCollapsed;
      document.getElementById("kbBody").style.display = kbCollapsed ? "none" : "block";
      document.querySelector(".kb-toggle").textContent = kbCollapsed ? "▸ Expand" : "▾ Collapse";
    }

    function getKbContext() {
      const rows = document.querySelectorAll(".kb-row");
      const entries = [];
      rows.forEach(row => {
        const topic = row.querySelector("input").value.trim();
        const detail = row.querySelector("textarea").value.trim();
        if (topic && detail) entries.push(`- ${topic}: ${detail}`);
      });
      return entries.length ? `\n\nPRODUCT KNOWLEDGE BASE (use this info when relevant):\n${entries.join("\n")}` : "";
    }

    addKbRow("Product name", "");
    addKbRow("Pricing", "Send us a message to know more about the product you are interested with.");
    addKbRow("Shipping", "Send us a message to know more about the product you are interested with.");

    document.getElementById("platformPills").addEventListener("click", e => {
      if (!e.target.classList.contains("pill")) return;
      document.querySelectorAll("#platformPills .pill").forEach(p => p.classList.remove("active"));
      e.target.classList.add("active");
      platform = e.target.dataset.val;
    });

    document.getElementById("vibePills").addEventListener("click", e => {
      if (!e.target.classList.contains("pill")) return;
      document.querySelectorAll("#vibePills .pill").forEach(p => p.classList.remove("active"));
      e.target.classList.add("active");
      vibe = e.target.dataset.val;
    });

    async function generate() {
      const comments = document.getElementById("commentsInput").value
        .split("\n").map(l => l.trim()).filter(Boolean);
      const username = document.getElementById("username").value || "@yourhandle";
      const errorEl = document.getElementById("errorMsg");

      if (!comments.length) { errorEl.textContent = "Paste at least one comment!"; return; }
      errorEl.textContent = "";

      const btn = document.getElementById("generateBtn");
      const loader = document.getElementById("loader");
      btn.disabled = true;
      btn.textContent = "Generating...";
      loader.style.display = "flex";
      document.getElementById("resultsHeader").style.display = "none";
      document.getElementById("summaryBar").style.display = "none";
      document.getElementById("repliesList").innerHTML = "";

      try {
        // Step 1: Check comments against keyword database
        const checkRes = await fetch("/api/check-comments", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ comments })
        });
        const checks = await checkRes.json();

        // Step 2: Only send non-keyword, non-human comments to AI
        const needsAI = checks.filter(c => !c.keywordReply && !c.needsHuman);

        let aiReplies = [];
        if (needsAI.length > 0) {
          const systemPrompt = `You are a social media creator replying to comments on your ${platform} post.
Your username is ${username}.
Your reply vibe/personality is: ${vibe}.${getKbContext()}

Rules:
- Reply to MOST comments (skip obvious spam or very low-effort ones)
- Every reply must feel DIFFERENT — vary sentence structure, length, emoji usage, openers
- Never start two replies the same way
- Sound like a real human, not a bot
- Keep replies short (1-2 sentences max)
- Use emojis naturally but don't overdo it
- Be genuine and conversational

Return ONLY a valid JSON array, no markdown, no extra text:
[
  { "comment": "original comment", "reply": "your reply", "skip": false },
  { "comment": "spam", "reply": "", "skip": true }
]`;

          const res = await fetch("/api/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-haiku-4-5-20251001",
              max_tokens: 1000,
              system: systemPrompt,
              messages: [{ role: "user", content: needsAI.map((c, i) => `${i+1}. ${c.comment}`).join("\n") }]
            })
          });

          const data = await res.json();
          if (data.error) throw new Error(data.error.message);
          const raw = data.content?.map(b => b.text || "").join("") || "";
          const match = raw.match(/\[[\s\S]*\]/);
          if (!match) throw new Error("No JSON array found in response");
          aiReplies = JSON.parse(match[0]);
        }

        // Step 3: Merge all results
        let aiIdx = 0;
        currentReplies = checks.map(c => {
          if (c.needsHuman) {
            return { comment: c.comment, reply: "", skip: false, needsHuman: true, type: "human" };
          } else if (c.keywordReply) {
            return { comment: c.comment, reply: c.keywordReply, skip: false, type: "keyword" };
          } else {
            const aiReply = aiReplies[aiIdx++];
            return { comment: c.comment, reply: aiReply?.reply || "", skip: aiReply?.skip || false, type: "ai" };
          }
        });

        renderReplies(currentReplies);

      } catch(e) {
        errorEl.textContent = "Error: " + (e.message || "Something went wrong. Please try again.");
        console.error(e);
      }

      btn.disabled = false;
      btn.textContent = "✦ Generate Replies";
      loader.style.display = "none";
    }

    function renderReplies(replies) {
      const list = document.getElementById("repliesList");
      const header = document.getElementById("resultsHeader");
      const summaryBar = document.getElementById("summaryBar");

      const humanCount = replies.filter(r => r.type === "human").length;
      const keywordCount = replies.filter(r => r.type === "keyword").length;
      const aiCount = replies.filter(r => r.type === "ai" && !r.skip).length;
      const totalReady = replies.filter(r => !r.skip && !r.needsHuman).length;

      document.getElementById("resultsCount").textContent = `${totalReady} repl${totalReady !== 1 ? "ies" : "y"} ready`;
      header.style.display = "flex";

      // Summary bar
      summaryBar.style.display = "flex";
      summaryBar.innerHTML = `
        <span class="summary-pill total">${replies.length} total</span>
        ${humanCount ? `<span class="summary-pill human">🚨 ${humanCount} need human</span>` : ""}
        ${keywordCount ? `<span class="summary-pill keyword">⚡ ${keywordCount} keyword matched</span>` : ""}
        ${aiCount ? `<span class="summary-pill ai">✦ ${aiCount} AI generated</span>` : ""}
      `;

      list.innerHTML = "";

      replies.forEach((r, i) => {
        const card = document.createElement("div");
        let cardClass = "reply-card";
        if (r.skip) cardClass += " skipped";
        else if (r.needsHuman) cardClass += " needs-human";
        else if (r.type === "keyword") cardClass += " keyword-match";
        card.className = cardClass;
        card.style.animationDelay = `${i * 0.05}s`;

        let badge = "";
        if (r.needsHuman) badge = `<div class="badge human">🚨 Needs Human Review</div>`;
        else if (r.type === "keyword") badge = `<div class="badge keyword">⚡ Keyword Match</div>`;
        else if (r.type === "ai") badge = `<div class="badge ai">✦ AI Generated</div>`;

        card.innerHTML = `
          ${badge}
          <div class="comment-label">${r.skip ? "⏭ Skipped" : r.needsHuman ? "⚠️ Comment" : "💬 Comment"}</div>
          <div class="comment-text">"${escHtml(r.comment)}"</div>
          ${r.needsHuman ? `
            <div class="reply-text" style="color:var(--warning);font-size:0.85rem;">
              ⚠️ This comment requires personal attention from your team before responding.
            </div>
          ` : !r.skip ? `
            <div class="reply-text">→ ${escHtml(r.reply)}</div>
            <button class="copy-btn" id="copybtn-${i}" onclick="copyOne(${i}, '${escAttr(r.reply)}')">Copy</button>
          ` : ""}
        `;
        list.appendChild(card);
      });
    }

    function copyOne(idx, text) {
      navigator.clipboard.writeText(text);
      const btn = document.getElementById(`copybtn-${idx}`);
      btn.textContent = "✓ Copied!";
      btn.classList.add("done");
      setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("done"); }, 1500);
    }

    function copyAll() {
      const text = currentReplies
        .filter(r => !r.skip && !r.needsHuman)
        .map(r => `→ ${r.comment}\n💬 ${r.reply}`).join("\n\n");
      navigator.clipboard.writeText(text);
      const btn = document.getElementById("copyAllBtn");
      btn.textContent = "✓ Copied all!";
      btn.classList.add("done");
      setTimeout(() => { btn.textContent = "Copy All"; btn.classList.remove("done"); }, 1500);
    }

    function escHtml(str) {
      return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
    function escAttr(str) {
      return String(str).replace(/'/g, "\\'").replace(/"/g, '\\"');
    }
  </script>
</body>
</html>
